name: Health Dashboard

on:
  schedule:
    - cron: '0 20 * * *'   # 4 AM Singapore time (UTC+8)
    - cron: '0 8 * * *'    # 4 PM Singapore time (UTC+8)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync from Intervals.icu
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: python3 sync.py 14

      - name: Generate dashboard
        run: python3 generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "Health Sync Bot"
          git config user.email "sync@health-ai"
          git add health/ docs/
          git diff --cached --quiet || git commit -m "sync: $(date -u '+%Y-%m-%d')"
          git push
