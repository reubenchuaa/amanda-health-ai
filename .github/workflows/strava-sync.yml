name: Health Dashboard

on:
  push:
    paths:
      - 'health/data.json'   # triggers whenever iPhone Shortcut pushes new data
  schedule:
    - cron: '0 20 * * *'    # 4 AM Singapore time (UTC+8) fallback rebuild
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate dashboard
        run: python3 generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "Health Sync Bot"
          git config user.email "sync@health-ai"
          git add docs/
          git diff --cached --quiet || git commit -m "dashboard: $(date -u '+%Y-%m-%d %H:%M')"
          git push
